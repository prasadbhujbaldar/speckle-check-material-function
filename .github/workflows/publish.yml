name: Publish Function Release

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Register release with Speckle engine
        run: |
          curl -s -X POST "${{ secrets.SPECKLE_AUTOMATE_URL }}/api/v2/functions/${{ secrets.SPECKLE_FUNCTION_ID }}/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SPECKLE_FUNCTION_TOKEN }}" \
            -d "{
              \"versionTag\": \"${{ github.sha }}\",
              \"commitId\": \"${{ github.sha }}\",
              \"image\": \"ghcr.io/${{ github.repository }}:${{ github.sha }}\",
              \"inputSchema\": {
                \"type\": \"object\",
                \"properties\": {
                  \"checkMaterial\": {
                    \"type\": \"boolean\",
                    \"title\": \"Check Material\",
                    \"default\": true
                  }
                }
              }
            }"
